---
# Flower Federated Learning - OneFlow Service Template (reference)
# Deploys a SuperLink coordinator + N SuperNode training nodes.
#
# For the supported, ready-to-import definitions use the marketplace appliance
# (appliances/flower_service/), which ships these objects with image references
# already wired. This file is a hand-editable starting point.
#
# Two manual steps are required before it can be instantiated:
#   1. Replace both `vm_template: 0` placeholders with your real VM template IDs.
#   2. oneflow-template create consumes JSON, not YAML, so convert first:
#        yq -o=json '.' flower-cluster.yaml > flower-cluster.json   # or any YAML->JSON tool
#        oneflow-template create flower-cluster.json
#        oneflow-template instantiate <template_id>

type: 'SERVICE_TEMPLATE'

template_body:
  name: 'Flower Federated Learning'
  deployment: 'straight'
  ready_status_gate: true
  shutdown_action: 'shutdown'

  # ── Service Inputs ─────────────────────────────────────────────────
  # These fields appear on the main instantiation form.
  # Every other setting uses sensible defaults inside the appliance.
  user_inputs:
    ONEAPP_FL_FRAMEWORK: 'O|list|Machine learning framework|pytorch,tensorflow,sklearn|pytorch'
    ONEAPP_FL_TLS_ENABLED: 'O|boolean|Encrypt communication between SuperLink and SuperNodes||YES'

  networks:
    Private: 'M|network|Private network for FL cluster| |id::'

  roles:
    # ── SuperLink: the central coordinator (singleton) ───────────────
    - name: 'superlink'
      cardinality: 1
      min_vms: 1
      max_vms: 1
      cooldown: 60
      # vm_template: Replace with your actual SuperLink VM template ID
      vm_template: 0
      parents: []

      vm_template_contents: |
        NIC = [ NETWORK_ID = "$Private" ]
        ONEAPP_FL_TLS_ENABLED = "$ONEAPP_FL_TLS_ENABLED"

    # ── SuperNode: training nodes (scalable) ─────────────────────────
    - name: 'supernode'
      cardinality: 2
      min_vms: 2
      max_vms: 10
      cooldown: 30
      # vm_template: Replace with your actual SuperNode VM template ID
      vm_template: 0
      parents:
        - 'superlink'

      vm_template_contents: |
        NIC = [ NETWORK_ID = "$Private" ]
        ONEAPP_FL_FRAMEWORK = "$ONEAPP_FL_FRAMEWORK"
        ONEAPP_FL_TLS_ENABLED = "$ONEAPP_FL_TLS_ENABLED"

      elasticity_policies: []
      scheduled_policies: []
