---
# Flower Federated Learning - build/test metadata
# Follows the one-apps / marketplace-community convention. Drives the
# do-tests pipeline: ":name" is built as DISTROS, ":os.base" as REQUIREMENTS.
# Flower ships two images, so both distros are listed here.

:app:
  :name: flower_superlink flower_supernode
  :type: service
  :os:
    :type: linux
    :base: ubuntu2404
  :hypervisor: KVM
  :context:
    :prefixed: true
    :params:
      :ONEAPP_FL_FRAMEWORK: 'pytorch'
      :ONEAPP_FL_TLS_ENABLED: 'YES'

:one:
  :template:
    NAME: base
    TEMPLATE:
      ARCH: x86_64
      CONTEXT:
        NETWORK: 'YES'
        SET_HOSTNAME: "$NAME"
        SSH_PUBLIC_KEY: "$USER[SSH_PUBLIC_KEY]"
      CPU: '2'
      CPU_MODEL:
        MODEL: host-passthrough
      GRAPHICS:
        LISTEN: 0.0.0.0
        TYPE: vnc
      MEMORY: '8192'
      NIC:
        NETWORK: service
      NIC_DEFAULT:
        MODEL: virtio
  :datastore_name: default
  :timeout: '120'

:infra:
  :disk_format: qcow2
  :apps_path: /var/tmp
