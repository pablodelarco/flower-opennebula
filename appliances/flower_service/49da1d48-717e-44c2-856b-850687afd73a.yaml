---
name: Flower SuperLink 1.31.0
version: 1.31.0-1.0.0
publisher: OpenNebula Systems
description: |-
  VM template for the [Flower](https://flower.ai/) SuperLink appliance
  (federated learning coordinator). Docs: [flower.ai/docs](https://flower.ai/docs/).

  Deploys a SuperLink VM that coordinates federated training, aggregates
  model updates from SuperNodes, and publishes its endpoint to OneGate for
  automatic discovery. The aggregation strategy and round count come from the
  Flower App Bundle you submit with `flwr run`. TLS is enabled by default and
  the host runs a default-deny firewall with the Control API bound to
  localhost (reach it over an SSH tunnel).

  Part of the **Flower Federated Learning** appliance set.
  Imported automatically when you export the
  [Service Flower FL 1.31.0](8b437ffe-7b90-4dc0-a453-f0646b11ab09) service.

  Requires
  [OneGate](https://docs.opennebula.io/stable/management_and_operations/multivm_service_management/onegate_usage.html)
  for SuperNode auto-discovery.
short_description: Flower SuperLink VM template (FL coordinator)
tags:
- flower
- federated-learning
- superlink
- ubuntu
- service
type: VMTEMPLATE
format: qcow2
creation_time: 1770822863
os-id: Ubuntu
os-release: '24.04 LTS'
os-arch: x86_64
hypervisor: KVM
opennebula_version: 6.8, 6.10, 7.0, 7.2
opennebula_template:
  context:
    token: 'YES'
    network: 'YES'
    report_ready: 'YES'
    username_password_reset: 'YES'
    ssh_public_key: "$USER[SSH_PUBLIC_KEY]"
    oneapp_flower_version: "$ONEAPP_FLOWER_VERSION"
    oneapp_fl_tls_enabled: "$ONEAPP_FL_TLS_ENABLED"
    oneapp_fl_log_level: "$ONEAPP_FL_LOG_LEVEL"
  cpu: '2'
  memory: '4096'
  graphics:
    listen: 0.0.0.0
    type: vnc
  inputs_order: >-
    ONEAPP_FL_TLS_ENABLED,ONEAPP_FL_LOG_LEVEL,ONEAPP_FLOWER_VERSION
  os:
    arch: x86_64
  user_inputs:
    oneapp_flower_version: "O|text|Flower Docker image version tag||1.31.0"
    oneapp_fl_tls_enabled: "O|boolean|Enable TLS encryption||YES"
    oneapp_fl_log_level: "O|list|Log verbosity|DEBUG,INFO,WARNING,ERROR|INFO"
logo: flower.png
disks:
- "Flower SuperLink 1.31.0 OS disk"
images: []
