---
name: Flower SuperLink 1.31.0 OS disk
version: 1.31.0-1.0.0
publisher: OpenNebula Systems
description: |-
  OS disk image for the [Flower](https://flower.ai/) SuperLink appliance
  (federated learning coordinator). Docs: [flower.ai/docs](https://flower.ai/docs/).

  Ubuntu 24.04 LTS with Docker CE and the `flwr/superlink:1.31.0` container
  pre-pulled. At boot, OpenNebula contextualization configures the SuperLink:
  TLS is enabled by default, the Control API is bound to localhost, and a
  default-deny firewall blocks outbound SMTP. The SuperLink publishes its
  endpoint to OneGate so SuperNodes discover it automatically. The aggregation
  strategy and round count come from the Flower App Bundle you submit at run
  time with flwr run.

  Part of the **Flower Federated Learning** appliance set.
  Imported automatically when you export the
  [Service Flower FL 1.31.0](8b437ffe-7b90-4dc0-a453-f0646b11ab09) service.
short_description: Flower SuperLink appliance OS disk (Ubuntu 24.04 + Docker + flwr 1.31.0)
